    function applyThemeSkin(theme) {
      const skin = theme && theme.skin ? theme.skin : blueSkin;
      activeSkin = skin;
      palette = skin.palette.slice();
      const root = document.documentElement.style;
      root.setProperty("--bg-deep", skin.bgDeep);
      root.setProperty("--bg-mid", skin.bgMid);
      root.setProperty("--tech-blue", skin.primary);
      root.setProperty("--neon-blue", skin.neon);
      root.setProperty("--white-glow", skin.white);
      root.setProperty("--gold", skin.accent);
      root.setProperty("--gold-strong", skin.accentStrong);
      root.setProperty("--danger", skin.danger);
      root.setProperty("--primary-rgb", skin.primaryRgb);
      root.setProperty("--neon-rgb", skin.neonRgb);
      root.setProperty("--accent-rgb", skin.accentRgb);
      root.setProperty("--panel-rgb", skin.panelRgb);
      root.setProperty("--panel-border", `rgba(${skin.neonRgb}, 0.34)`);
      root.setProperty("--shadow-blue", `0 0 34px rgba(${skin.primaryRgb}, 0.42)`);
      root.setProperty("--shadow-gold", `0 0 34px rgba(${skin.accentRgb}, 0.4)`);
      drawWheel();
    }

    function applyActivityTitle(title) {
      const cleanTitle = (title || "").trim() || defaultConfig.activityTitle;
      els.activityTitleText.textContent = cleanTitle;
      document.title = `${cleanTitle} - ${uiText.pageTitleSuffix}`;
    }

    function loadDefaultConfig() {
      document.documentElement.dataset.defaultConfigLoaded = window.LUCKY_WHEEL_DEFAULT_CONFIG ? "true" : "false";
      document.documentElement.dataset.localConfigLoaded = window.LUCKY_WHEEL_LOCAL_CONFIG ? "true" : "false";
      els.activityTitleInput.value = defaultConfig.activityTitle || "Lucky Draw";
      els.schemeInput.value = Array.isArray(defaultConfig.schemes)
        ? defaultConfig.schemes.join("\n")
        : String(defaultConfig.schemes || "Proposal A");
      els.nameInput.value = Array.isArray(defaultConfig.names)
        ? defaultConfig.names.join("\n")
        : String(defaultConfig.names || "");
      applyActivityTitle(els.activityTitleInput.value);
    }

    function setThemeImage(url, persistValue = "") {
      if (!url) {
        document.documentElement.style.setProperty("--active-theme-image", "none");
        document.body.classList.remove("theme-image-on");
        if (persistValue) localStorage.removeItem("luckyWheelTheme");
        markActiveTheme("default");
        return;
      }
      document.documentElement.style.setProperty("--active-theme-image", `url("${url}")`);
      document.body.classList.add("theme-image-on");
      if (persistValue) localStorage.setItem("luckyWheelTheme", persistValue);
    }

    function applyTheme(value, options = {}) {
      const requestedTheme = themeMap[value] || themeMap.default;
      applyThemeSkin(requestedTheme);

      if (value === "default") {
        setThemeImage("", options.persist ? "default" : "");
        setMessage(uiText.themeResetMessage);
        return;
      }

      const theme = requestedTheme;
      if (!theme || !theme.url) return;

      const img = new Image();
      img.onload = () => {
        setThemeImage(theme.url, options.persist ? value : "");
        markActiveTheme(value);
        setMessage(`${uiText.themeSwitchedPrefix}${theme.name}`, "success");
      };
      img.onerror = () => {
        setThemeImage("", options.persist ? "default" : "");
        setMessage(`${uiText.themeImageMissingPrefix}${theme.url}${uiText.themeImageMissingSuffix}`, "error");
      };
      img.src = `${theme.url}?v=${Date.now()}`;
    }

    function restoreSavedTheme() {
      const savedTheme = localStorage.getItem("luckyWheelTheme");
      if (savedTheme && savedTheme !== "default" && themeMap[savedTheme]) {
        applyTheme(savedTheme);
      } else if (defaultConfig.defaultTheme && themeMap[defaultConfig.defaultTheme]) {
        applyTheme(defaultConfig.defaultTheme);
      }
    }

    function renderThemeCards() {
      els.themeGrid.innerHTML = "";
      themeCatalog.forEach((theme) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "theme-card";
        button.dataset.themeId = theme.id;
        button.setAttribute("aria-pressed", theme.id === "default" ? "true" : "false");

        const thumb = document.createElement("span");
        thumb.className = "theme-thumb";
        if (theme.url) thumb.style.backgroundImage = `url("${theme.url}")`;

        const name = document.createElement("span");
        name.className = "theme-name";
        name.textContent = theme.name;

        button.append(thumb, name);
        button.addEventListener("click", () => applyTheme(theme.id, { persist: true }));
        els.themeGrid.appendChild(button);
      });
      markActiveTheme("default");
    }

    function markActiveTheme(themeId) {
      els.themeGrid.querySelectorAll(".theme-card").forEach((card) => {
        const isActive = card.dataset.themeId === themeId;
        card.classList.toggle("active", isActive);
        card.setAttribute("aria-pressed", String(isActive));
      });
    }

    function toggleConfigPanel(forceOpen) {
      const shouldOpen = typeof forceOpen === "boolean" ? forceOpen : els.sidePanel.classList.contains("collapsed");
      els.sidePanel.classList.toggle("collapsed", !shouldOpen);
      els.configToggleBtn.setAttribute("aria-expanded", String(shouldOpen));
      els.configToggleBtn.setAttribute("aria-label", shouldOpen ? uiText.configCloseAria : uiText.configOpenAria);
    }

    function toggleConfigSection(section, forceOpen) {
      const shouldOpen = typeof forceOpen === "boolean" ? forceOpen : !section.classList.contains("open");
      section.classList.toggle("open", shouldOpen);
      const button = section.querySelector(".section-toggle");
      if (button) button.setAttribute("aria-expanded", String(shouldOpen));
    }

    function normalizeLineList(raw, limit = 200) {
      const seen = new Set();
      const items = raw
        .split(/\r?\n|,|，|;|；|\t/g)
        .map((item) => item.trim())
        .filter(Boolean)
        .filter((item) => {
          const key = item.toLowerCase();
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      return items.slice(0, limit);
    }

    function normalizeNameList(raw) {
      return normalizeLineList(raw, 200);
    }

    function normalizeSchemeList(raw) {
      return normalizeLineList(raw, 200);
    }

    function validateNames(names) {
      if (names.length < 5) return uiText.validationMinNames;
      if (names.length > 200) return uiText.validationMaxNames;
      return "";
    }

    function validateSchemes(schemes) {
      if (schemes.length < 1) return uiText.validationMinSchemes;
      if (schemes.length > 200) return uiText.validationMaxSchemes;
      return "";
    }

    function syncInputFromState() {
      els.nameInput.value = state.names.join("\n");
      els.schemeInput.value = state.schemes.join("\n");
    }

    function generateWheel() {
      const names = normalizeNameList(els.nameInput.value);
      const schemes = normalizeSchemeList(els.schemeInput.value);
      const nameError = validateNames(names);
      const schemeError = validateSchemes(schemes);
      if (nameError || schemeError) {
        setMessage(nameError || schemeError, "error");
        return false;
      }
      state.names = names;
      state.schemes = schemes;
      applyActivityTitle(els.activityTitleInput.value);
      state.drawn.clear();
      state.history = [];
      state.currentWinner = null;
      state.currentScheme = null;
      state.selectedNameIndex = -1;
      state.selectedSchemeIndex = -1;
      state.nameRotation = -Math.PI / 2;
      state.schemeRotation = -Math.PI / 2;
      syncInputFromState();
      updateUI();
      drawWheel();
      setMessage(`${uiText.generatedPrefix} ${names.length} ${uiText.generatedNamesSuffix}${schemes.length > 1 ? `${uiText.generatedSchemesJoin} ${schemes.length} ${uiText.generatedSchemesSuffix}` : ""}。`, "success");
      return true;
    }

    function updateUI() {
      const total = state.names.length;
      const drawnCount = state.drawn.size;
      const remaining = Math.max(0, total - drawnCount);
      els.totalCount.textContent = total;
      els.remainingCount.textContent = remaining;
      els.drawnCount.textContent = drawnCount;
      els.subtitleText.textContent = state.schemes.length === 1
        ? state.schemes[0]
        : `${state.schemes.length || 0} ${uiText.multipleSchemesSuffix}`;
      els.drawnMini.textContent = drawnCount ? `${uiText.drawnCompletedPrefix} ${drawnCount} ${uiText.drawnCompletedSuffix}` : uiText.drawnWaiting;
      els.startBtn.disabled = state.isSpinning || total < 5 || remaining === 0;
      els.hubButton.disabled = els.startBtn.disabled;
      els.hubText.innerHTML = state.isSpinning ? lineBreakText(uiText.hubDrawing) : lineBreakText(uiText.hubStart);
      els.exportBtn.disabled = state.history.length === 0;

      els.drawnList.innerHTML = "";
      state.names.filter((name) => state.drawn.has(name)).forEach((name) => {
        const li = document.createElement("li");
        li.textContent = name;
        els.drawnList.appendChild(li);
      });
      els.drawnEmpty.style.display = drawnCount ? "none" : "block";

      els.historyList.innerHTML = "";
      state.history.forEach((record) => {
        const li = document.createElement("li");
        li.textContent = record.scheme
          ? `${record.name} · ${record.scheme} · ${record.time}`
          : `${record.name} · ${record.time}`;
        els.historyList.appendChild(li);
      });
      els.historyEmpty.style.display = state.history.length ? "none" : "block";
    }

    function drawWheel(highlightNameIndex = -1, highlightSchemeIndex = -1) {
      const canvas = els.wheelCanvas;
      const ctx = wheelCtx;
      const width = canvas.width;
      const height = canvas.height;
      const cx = width / 2;
      const cy = height / 2;
      const radius = Math.min(width, height) * 0.47;
      const names = state.names;
      const schemes = state.schemes;
      const hasSchemeRing = schemes.length > 1;
      const nameOuterRadius = hasSchemeRing ? radius * 0.66 : radius;
      const nameTextRadius = hasSchemeRing ? radius * 0.43 : radius * 0.64;
      const schemeInnerRadius = radius * 0.69;
      const schemeTextRadius = radius * 0.84;

      ctx.clearRect(0, 0, width, height);
      ctx.save();
      ctx.translate(cx, cy);

      if (!names.length) {
        drawEmptyWheel(ctx, radius);
        ctx.restore();
        return;
      }

      ctx.save();
      ctx.rotate(state.nameRotation);
      const nameSlice = (Math.PI * 2) / names.length;
      for (let i = 0; i < names.length; i += 1) {
        const start = i * nameSlice;
        const end = start + nameSlice;
        const name = names[i];
        const isDrawn = state.drawn.has(name);
        const isSelected = i === highlightNameIndex || i === state.selectedNameIndex;
        const base = palette[i % palette.length];
        const next = palette[(i + 2) % palette.length];

        const gradient = ctx.createRadialGradient(0, 0, radius * 0.12, 0, 0, nameOuterRadius);
        gradient.addColorStop(0, isDrawn ? "rgba(180, 190, 205, 0.34)" : isSelected ? hexToRgba(activeSkin.accent, 0.92) : lighten(base, 24));
        gradient.addColorStop(0.58, isDrawn ? "rgba(95, 105, 122, 0.36)" : isSelected ? activeSkin.accentStrong : base);
        gradient.addColorStop(1, isDrawn ? "rgba(38, 48, 66, 0.38)" : isSelected ? activeSkin.primary : next);

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, nameOuterRadius, start, end);
        ctx.closePath();
        ctx.fillStyle = gradient;
        ctx.globalAlpha = isDrawn ? 0.48 : 1;
        ctx.fill();

        ctx.lineWidth = isSelected ? 8 : 2;
        ctx.strokeStyle = isSelected ? activeSkin.accent : "rgba(234, 244, 255, 0.44)";
        ctx.shadowColor = isSelected ? hexToRgba(activeSkin.accent, 0.95) : "transparent";
        ctx.shadowBlur = isSelected ? 26 : 0;
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;

        drawSegmentContent({
          ctx,
          name,
          iconType: segmentIconTypes[i % segmentIconTypes.length],
          angle: start + nameSlice / 2,
          textRadius: nameTextRadius,
          slice: nameSlice,
          count: names.length,
          muted: isDrawn,
          selected: isSelected,
          completed: isDrawn
        });
      }
      ctx.restore();

      if (hasSchemeRing) {
        ctx.save();
        ctx.rotate(state.schemeRotation);
        const schemeSlice = (Math.PI * 2) / schemes.length;
        for (let i = 0; i < schemes.length; i += 1) {
          const start = i * schemeSlice;
          const end = start + schemeSlice;
          const base = palette[(i * 2 + 3) % palette.length];
          const next = palette[(i * 2 + 7) % palette.length];
          const gradient = ctx.createRadialGradient(0, 0, schemeInnerRadius, 0, 0, radius);
          gradient.addColorStop(0, lighten(base, 12));
          gradient.addColorStop(0.62, base);
          gradient.addColorStop(1, next);

          ctx.beginPath();
          ctx.arc(0, 0, radius, start, end);
          ctx.arc(0, 0, schemeInnerRadius, end, start, true);
          ctx.closePath();
          ctx.fillStyle = gradient;
          ctx.fill();

          const isSelectedScheme = i === highlightSchemeIndex || i === state.selectedSchemeIndex;
          ctx.lineWidth = isSelectedScheme ? 8 : 2;
          ctx.strokeStyle = isSelectedScheme ? activeSkin.white : "rgba(234, 244, 255, 0.36)";
          ctx.shadowColor = isSelectedScheme ? hexToRgba(activeSkin.accent, 0.85) : "transparent";
          ctx.shadowBlur = isSelectedScheme ? 24 : 0;
          ctx.stroke();
          ctx.shadowBlur = 0;

          drawWheelLabel({
            ctx,
            text: schemes[i],
            angle: start + schemeSlice / 2,
            textRadius: schemeTextRadius,
            slice: schemeSlice,
            count: schemes.length,
            muted: false,
            strike: false,
            fontScale: 0.82
          });
        }
        ctx.restore();

        ctx.beginPath();
        ctx.arc(0, 0, schemeInnerRadius, 0, Math.PI * 2);
        ctx.lineWidth = 7;
        ctx.strokeStyle = hexToRgba(activeSkin.white, 0.74);
        ctx.shadowColor = hexToRgba(activeSkin.accent, 0.7);
        ctx.shadowBlur = 18;
        ctx.stroke();
        ctx.shadowBlur = 0;
      }

      if (state.isSpinning) drawMotionStreaks(ctx, radius);
      drawRings(ctx, radius);
      ctx.restore();
    }

    function drawSegmentContent({ ctx, name, iconType, angle, textRadius, slice, count, muted, selected, completed }) {
      const fontSize = Math.max(16, Math.min(40, 1180 / Math.max(14, count)));
      const maxWidth = Math.max(72, textRadius * Math.sin(slice / 2) * 1.68);
      const display = fitText(ctx, name, maxWidth, fontSize);
      const status = completed ? `✓ ${uiText.statusCompleted}` : selected ? uiText.statusSelected : uiText.statusReady;
      const statusSize = Math.max(11, fontSize * 0.58);
      const iconSize = Math.max(20, fontSize * 1.08);

      ctx.save();
      ctx.rotate(angle);
      ctx.translate(textRadius, 0);
      ctx.rotate(Math.PI / 2);
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      const mainColor = completed ? "rgba(205, 215, 226, 0.66)" : selected ? activeSkin.bgDeep : "#FFFFFF";
      const glow = selected ? hexToRgba(activeSkin.accent, 0.95) : hexToRgba(activeSkin.neon, 0.72);

      drawLucideIcon(ctx, iconType, 0, -fontSize * 1.28, iconSize, mainColor, completed ? 0.55 : 1);

      ctx.font = `900 ${fontSize}px ${canvasFontFamily}`;
      ctx.fillStyle = mainColor;
      ctx.strokeStyle = selected ? "rgba(255, 255, 255, 0.52)" : "rgba(2, 10, 24, 0.72)";
      ctx.lineWidth = 5;
      ctx.shadowColor = completed ? "transparent" : glow;
      ctx.shadowBlur = completed ? 0 : selected ? 18 : 9;
      ctx.strokeText(display, 0, 0);
      ctx.fillText(display, 0, 0);
      ctx.shadowBlur = 0;

      ctx.font = `900 ${statusSize}px ${canvasFontFamily}`;
      const statusWidth = Math.min(maxWidth, ctx.measureText(status).width + 24);
      const statusY = fontSize * 1.26;
      roundRect(ctx, -statusWidth / 2, statusY - statusSize * 1.02, statusWidth, statusSize * 1.95, statusSize * 0.78);
      ctx.fillStyle = completed ? "rgba(234, 244, 255, 0.18)" : selected ? "rgba(255, 255, 255, 0.92)" : hexToRgba(activeSkin.primary, 0.46);
      ctx.fill();
      ctx.strokeStyle = completed ? "rgba(234, 244, 255, 0.42)" : selected ? hexToRgba(activeSkin.accent, 0.86) : "rgba(234, 244, 255, 0.58)";
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = completed ? "rgba(220, 228, 238, 0.82)" : selected ? activeSkin.primary : activeSkin.white;
      ctx.fillText(status, 0, statusY);
      ctx.restore();
    }

    function drawEmptyWheel(ctx, radius) {
      const gradient = ctx.createRadialGradient(0, 0, radius * 0.15, 0, 0, radius);
      gradient.addColorStop(0, activeSkin.white);
      gradient.addColorStop(0.58, activeSkin.primary);
      gradient.addColorStop(1, activeSkin.bgDeep);
      ctx.beginPath();
      ctx.arc(0, 0, radius, 0, Math.PI * 2);
      ctx.fillStyle = gradient;
      ctx.fill();
      ctx.lineWidth = 8;
      ctx.strokeStyle = "rgba(255, 255, 255, 0.72)";
      ctx.stroke();
      ctx.fillStyle = "rgba(255, 255, 255, 0.88)";
      ctx.font = `900 58px ${canvasFontFamily}`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(uiText.emptyWheelTitle, 0, -20);
      ctx.font = `700 30px ${canvasFontFamily}`;
      ctx.fillStyle = hexToRgba(activeSkin.accent, 0.95);
      ctx.fillText(uiText.emptyWheelHint, 0, 44);
      drawRings(ctx, radius);
    }

    function drawWheelLabel({ ctx, text, angle, textRadius, slice, count, muted, strike, fontScale = 1 }) {
      const maxWidth = Math.max(54, textRadius * Math.sin(slice / 2) * 1.55);
      const fontSize = Math.max(13, Math.min(30, (980 / Math.max(18, count)) * fontScale));
      const display = fitText(ctx, text, maxWidth, fontSize);

      ctx.save();
      ctx.rotate(angle);
      ctx.translate(textRadius, 0);
      ctx.rotate(Math.PI / 2);
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = `900 ${fontSize}px ${canvasFontFamily}`;
      ctx.fillStyle = muted ? "rgba(230, 238, 248, 0.58)" : "#fff";
      ctx.strokeStyle = "rgba(2, 10, 24, 0.72)";
      ctx.lineWidth = 5;
      ctx.strokeText(display, 0, 0);
      ctx.shadowColor = muted ? "transparent" : "rgba(255, 255, 255, 0.72)";
      ctx.shadowBlur = muted ? 0 : 10;
      ctx.fillText(display, 0, 0);
      ctx.shadowBlur = 0;

      if (strike) {
        const lineWidth = Math.min(maxWidth, ctx.measureText(display).width + 14);
        ctx.beginPath();
        ctx.moveTo(-lineWidth / 2, 0);
        ctx.lineTo(lineWidth / 2, 0);
        ctx.lineWidth = 4;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.74)";
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawRings(ctx, radius) {
      ctx.save();
      for (let i = 0; i < 3; i += 1) {
        ctx.beginPath();
        ctx.arc(0, 0, radius - i * 18, 0, Math.PI * 2);
        ctx.lineWidth = i === 0 ? 8 : 2;
        ctx.strokeStyle = i === 0 ? hexToRgba(activeSkin.white, 0.86) : hexToRgba(activeSkin.accent, 0.35);
        ctx.shadowColor = i === 0 ? hexToRgba(activeSkin.accent, 0.76) : "transparent";
        ctx.shadowBlur = i === 0 ? 18 : 0;
        ctx.stroke();
      }

      ctx.beginPath();
      ctx.arc(0, 0, radius * 0.18, 0, Math.PI * 2);
      ctx.fillStyle = hexToRgba(activeSkin.bgDeep, 0.94);
      ctx.fill();
      ctx.lineWidth = 5;
      ctx.strokeStyle = hexToRgba(activeSkin.accent, 0.94);
      ctx.shadowColor = hexToRgba(activeSkin.accent, 0.88);
      ctx.shadowBlur = 18;
      ctx.stroke();
      ctx.restore();
    }

    function fitText(ctx, text, maxWidth, fontSize) {
      ctx.font = `900 ${fontSize}px ${canvasFontFamily}`;
      if (ctx.measureText(text).width <= maxWidth) return text;
      let output = text;
      while (output.length > 1 && ctx.measureText(`${output}…`).width > maxWidth) {
        output = output.slice(0, -1);
      }
      return `${output}…`;
    }

    function roundRect(ctx, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + width - r, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + r);
      ctx.lineTo(x + width, y + height - r);
      ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
      ctx.lineTo(x + r, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawLucideIcon(ctx, type, x, y, size, color, alpha = 1) {
      const s = size / 24;
      const p = (value) => value * s;
      const line = (...points) => {
        ctx.beginPath();
        points.forEach(([px, py], index) => {
          if (index === 0) ctx.moveTo(p(px), p(py));
          else ctx.lineTo(p(px), p(py));
        });
        ctx.stroke();
      };
      const circle = (cx, cy, r) => {
        ctx.beginPath();
        ctx.arc(p(cx), p(cy), p(r), 0, Math.PI * 2);
        ctx.stroke();
      };
      const poly = (...points) => {
        ctx.beginPath();
        points.forEach(([px, py], index) => {
          if (index === 0) ctx.moveTo(p(px), p(py));
          else ctx.lineTo(p(px), p(py));
        });
        ctx.closePath();
        ctx.stroke();
      };

      ctx.save();
      ctx.translate(x - size / 2, y - size / 2);
      ctx.globalAlpha *= alpha;
      ctx.strokeStyle = color;
      ctx.lineWidth = Math.max(1.6, size * 0.095);
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.shadowColor = alpha < 0.8 ? "transparent" : color;
      ctx.shadowBlur = alpha < 0.8 ? 0 : 8;

      switch (type) {
        case "car":
          line([3, 13], [5, 8], [19, 8], [21, 13]);
          line([5, 13], [19, 13]);
          line([6, 13], [6, 17], [18, 17], [18, 13]);
          circle(7.5, 17, 1.6);
          circle(16.5, 17, 1.6);
          break;
        case "brain":
          circle(8, 9, 3.2);
          circle(15.6, 9, 3.2);
          line([8, 12], [8, 19], [12, 21], [16, 19], [16, 12]);
          line([12, 5], [12, 21]);
          break;
        case "rocket":
          line([7, 17], [4, 20]);
          line([17, 7], [20, 4]);
          poly([8, 16], [15, 5], [19, 9], [8, 16]);
          line([9, 15], [5, 15], [5, 19], [9, 15]);
          circle(14.6, 9.4, 1.6);
          break;
        case "compass":
          circle(12, 12, 8);
          poly([15, 9], [13, 15], [9, 17], [11, 11]);
          break;
        case "target":
          circle(12, 12, 8.5);
          circle(12, 12, 5);
          circle(12, 12, 1.6);
          break;
        case "gem":
          poly([6, 4], [18, 4], [22, 10], [12, 21], [2, 10]);
          line([2, 10], [22, 10]);
          line([8, 4], [12, 21], [16, 4]);
          break;
        case "sparkles":
          poly([12, 2], [14, 9], [21, 12], [14, 15], [12, 22], [10, 15], [3, 12], [10, 9]);
          line([4, 4], [6, 6]);
          line([18, 18], [20, 20]);
          break;
        case "shield":
          poly([12, 3], [20, 7], [18, 17], [12, 21], [6, 17], [4, 7]);
          line([12, 8], [12, 16]);
          break;
        case "trophy":
          line([8, 4], [16, 4], [16, 10], [14, 14], [10, 14], [8, 10], [8, 4]);
          line([8, 7], [4, 7], [4, 10], [8, 11]);
          line([16, 7], [20, 7], [20, 10], [16, 11]);
          line([12, 14], [12, 19]);
          line([8, 21], [16, 21]);
          break;
        case "chart":
        default:
          line([4, 19], [20, 19]);
          line([6, 16], [6, 19]);
          line([11, 11], [11, 19]);
          line([16, 6], [16, 19]);
          line([5, 10], [10, 8], [15, 4], [20, 6]);
          break;
      }
      ctx.restore();
    }

    function drawMotionStreaks(ctx, radius) {
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      for (let i = 0; i < 34; i += 1) {
        const angle = (Math.PI * 2 * i) / 34 + state.nameRotation * 0.22;
        const inner = radius * (0.34 + Math.random() * 0.34);
        const outer = radius * (0.72 + Math.random() * 0.22);
        ctx.beginPath();
        ctx.arc(0, 0, (inner + outer) / 2, angle, angle + 0.09 + Math.random() * 0.08);
        ctx.lineWidth = Math.max(2, (outer - inner) * 0.035);
        ctx.strokeStyle = i % 5 === 0 ? "rgba(255, 216, 107, 0.38)" : "rgba(74, 168, 255, 0.32)";
        ctx.shadowColor = i % 5 === 0 ? "rgba(255, 216, 107, 0.75)" : "rgba(74, 168, 255, 0.7)";
        ctx.shadowBlur = 16;
        ctx.stroke();
      }
      ctx.restore();
    }

    function lighten(hex, amount) {
      const raw = hex.replace("#", "");
      const num = parseInt(raw, 16);
      const r = Math.min(255, ((num >> 16) & 255) + amount);
      const g = Math.min(255, ((num >> 8) & 255) + amount);
      const b = Math.min(255, (num & 255) + amount);
      return `rgb(${r}, ${g}, ${b})`;
    }

    function getAvailableIndexes() {
      return state.names
        .map((name, index) => ({ name, index }))
        .filter((item) => !state.drawn.has(item.name))
        .map((item) => item.index);
    }

    function getIndexAtPointer(rotation, count) {
      if (!count) return -1;
      const slice = (Math.PI * 2) / count;
      const pointerAngle = (Math.PI * 1.5 - rotation) % (Math.PI * 2);
      const normalized = pointerAngle < 0 ? pointerAngle + Math.PI * 2 : pointerAngle;
      return Math.floor(normalized / slice) % count;
    }

    function computeTargetRotation(targetIndex, count, direction = 1) {
      const slice = (Math.PI * 2) / count;
      const centerAngle = targetIndex * slice + slice / 2;
      const pointerAngle = Math.PI * 1.5;
      const fullTurns = 8 + Math.floor(Math.random() * 5);
      const jitter = (Math.random() - 0.5) * slice * 0.44;
      return pointerAngle - centerAngle + direction * fullTurns * Math.PI * 2 + jitter;
    }

    function startDraw() {
      if (state.isSpinning) return;
      if (!state.names.length && !generateWheel()) return;
      const available = getAvailableIndexes();
      if (!available.length) {
        setMessage(uiText.noRemaining, "error");
        return;
      }

      state.isSpinning = true;
      state.selectedNameIndex = -1;
      state.selectedSchemeIndex = -1;
      updateUI();
      els.winnerModal.classList.remove("show");

      const targetIndex = available[Math.floor(Math.random() * available.length)];
      const hasSchemeRing = state.schemes.length > 1;
      const targetSchemeIndex = hasSchemeRing ? Math.floor(Math.random() * state.schemes.length) : 0;
      const startNameRotation = state.nameRotation;
      const startSchemeRotation = state.schemeRotation;
      const targetNameRotation = computeTargetRotation(targetIndex, state.names.length, 1);
      const targetSchemeRotation = hasSchemeRing
        ? computeTargetRotation(targetSchemeIndex, state.schemes.length, -1)
        : state.schemeRotation;
      const duration = 3000 + Math.random() * 3000;
      const startTime = performance.now();
      const spinStopper = playSpinSound();
      state.spinSoundStop = spinStopper;
      burstParticles("spin");

      state.spinTimeout = window.setTimeout(() => {
        if (!state.isSpinning) return;
        cancelAnimationFrame(state.spinFrame);
        state.nameRotation = normalizeRadians(targetNameRotation);
        state.schemeRotation = normalizeRadians(targetSchemeRotation);
        finishDraw();
      }, duration + 180);

      function animate(now) {
        const progress = Math.min(1, (now - startTime) / duration);
        const eased = championshipSpinEase(progress);
        state.nameRotation = startNameRotation + (targetNameRotation - startNameRotation) * eased;
        state.schemeRotation = startSchemeRotation + (targetSchemeRotation - startSchemeRotation) * eased;
        drawWheel();

        if (progress < 1) {
          state.spinFrame = requestAnimationFrame(animate);
        } else {
          state.nameRotation = normalizeRadians(state.nameRotation);
          state.schemeRotation = normalizeRadians(state.schemeRotation);
          finishDraw();
        }
      }

      requestAnimationFrame(animate);
    }

    function finishDraw() {
      if (state.spinTimeout) {
        clearTimeout(state.spinTimeout);
        state.spinTimeout = 0;
      }
      const winnerIndex = getIndexAtPointer(state.nameRotation, state.names.length);
      const schemeIndex = state.schemes.length > 1 ? getIndexAtPointer(state.schemeRotation, state.schemes.length) : 0;
      const winner = state.names[winnerIndex];
      const scheme = state.schemes[schemeIndex] || "";
      state.isSpinning = false;
      if (state.spinSoundStop) state.spinSoundStop();
      playWinSound();

      if (!winner || state.drawn.has(winner)) {
        setMessage(uiText.invalidLanding, "error");
        updateUI();
        drawWheel();
        setTimeout(startDraw, 260);
        return;
      }

      state.currentWinner = winner;
      state.currentScheme = scheme;
      state.selectedNameIndex = winnerIndex;
      state.selectedSchemeIndex = schemeIndex;
      state.drawn.add(winner);
      state.history.unshift({
        name: winner,
        scheme,
        time: new Date().toLocaleString("zh-CN", { hour12: false })
      });
      updateUI();
      drawWheel(winnerIndex, state.schemes.length > 1 ? schemeIndex : -1);
      showWinner(winner, scheme);
      launchCelebration();
      speakWinner(winner);
      setMessage(`${uiText.winnerTitle} - ${winner} - ${scheme}. ${uiText.winMessageSuffix}`, "success");
      els.liveRegion.textContent = `${uiText.winnerTitle} - ${winner} - ${scheme}. ${uiText.winMessageSuffix}`;
    }

    function championshipSpinEase(t) {
      if (t < 0.18) {
        const p = t / 0.18;
        return 0.12 * p * p;
      }
      const p = (t - 0.18) / 0.82;
      return 0.12 + 0.88 * (1 - Math.pow(1 - p, 4));
    }

    function normalizeRadians(value) {
      const full = Math.PI * 2;
      return ((value % full) + full) % full;
    }

    function showWinner(name, scheme) {
      els.winnerName.textContent = name;
      els.winnerScheme.textContent = scheme ? `${uiText.winnerSchemePrefix}${scheme}` : "";
      els.winnerScheme.style.display = scheme ? "block" : "none";
      els.winnerModal.classList.add("show");
    }

    function speakWinner(name) {
      try {
        if (!("speechSynthesis" in window) || !window.SpeechSynthesisUtterance) return;
        const utterance = new SpeechSynthesisUtterance(`${uiText.speechPrefix}${name}`);
        utterance.lang = "zh-CN";
        utterance.rate = 0.92;
        utterance.pitch = 1.12;
        utterance.volume = 1;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
      } catch (error) {}
    }

    function resetAll() {
      if (state.isSpinning) return;
      if (state.spinTimeout) {
        clearTimeout(state.spinTimeout);
        state.spinTimeout = 0;
      }
      state.drawn.clear();
      state.history = [];
      state.currentWinner = null;
      state.currentScheme = null;
      state.selectedNameIndex = -1;
      state.selectedSchemeIndex = -1;
      state.nameRotation = -Math.PI / 2;
      state.schemeRotation = -Math.PI / 2;
      els.winnerModal.classList.remove("show");
      updateUI();
      drawWheel();
      setMessage(uiText.resetDone, "success");
    }

    function shuffleNames() {
      if (state.isSpinning) return;
      const names = normalizeNameList(els.nameInput.value);
      const error = validateNames(names);
      if (error) {
        setMessage(error, "error");
        return;
      }
      for (let i = names.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [names[i], names[j]] = [names[j], names[i]];
      }
      els.nameInput.value = names.join("\n");
      generateWheel();
      setMessage(uiText.shuffleDone, "success");
    }

    function clearNames() {
      if (state.isSpinning) return;
      if (state.spinTimeout) {
        clearTimeout(state.spinTimeout);
        state.spinTimeout = 0;
      }
      els.nameInput.value = "";
      state.names = [];
      state.drawn.clear();
      state.history = [];
      state.currentWinner = null;
      state.currentScheme = null;
      state.selectedNameIndex = -1;
      state.selectedSchemeIndex = -1;
      state.nameRotation = -Math.PI / 2;
      state.schemeRotation = -Math.PI / 2;
      updateUI();
      drawWheel();
      setMessage(uiText.clearDone);
    }

    function exportCsv() {
      if (!state.history.length) {
        setMessage(uiText.exportEmpty, "error");
        return;
      }
      const rows = [["#", "Name", "Proposal", "Drawn At"]];
      state.history.slice().reverse().forEach((record, index) => {
        rows.push([index + 1, record.name, record.scheme || "", record.time]);
      });
      const csv = "\uFEFF" + rows.map((row) => row.map(csvEscape).join(",")).join("\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `lucky-draw_${formatDateForFile(new Date())}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      setMessage(uiText.exportDone, "success");
    }

    function csvEscape(value) {
      const text = String(value);
      if (/[",\n\r]/.test(text)) return `"${text.replace(/"/g, '""')}"`;
      return text;
    }

    function formatDateForFile(date) {
      const pad = (num) => String(num).padStart(2, "0");
      return `${date.getFullYear()}${pad(date.getMonth() + 1)}${pad(date.getDate())}_${pad(date.getHours())}${pad(date.getMinutes())}${pad(date.getSeconds())}`;
    }

    async function toggleFullscreen() {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
          setButtonContent(els.fullscreenBtn, "fullscreen", uiText.exitFullscreenButton);
        } else {
          await document.exitFullscreen();
          setButtonContent(els.fullscreenBtn, "fullscreen", uiText.fullscreenButton);
        }
      } catch (error) {
        setMessage(uiText.fullscreenBlocked, "error");
      }
    }

    async function importNamesFromFile(file) {
      if (!file) return;
      const ext = file.name.split(".").pop().toLowerCase();
      if (ext === "xlsx" || ext === "xls") {
        setMessage(uiText.excelNotSupported, "error");
        els.fileInput.value = "";
        return;
      }

      try {
        const text = await file.text();
        const names = normalizeNameList(text);
        const error = validateNames(names);
        if (error) {
          setMessage(error, "error");
          return;
        }
        els.nameInput.value = names.join("\n");
        generateWheel();
        setMessage(uiText.importedCountTemplate.replace("{count}", names.length), "success");
      } catch (error) {
        setMessage(uiText.fileReadFailed, "error");
      } finally {
        els.fileInput.value = "";
      }
    }

    function getAudioContext() {
      if (state.audio) return state.audio;
      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return null;
        state.audio = new AudioContextClass();
        return state.audio;
      } catch (error) {
        return null;
      }
    }

    function playFallbackAudio(kind, loop = false) {
      try {
        if (!window.Audio) return () => {};
        if (!state.fallbackAudioCache[kind]) {
          state.fallbackAudioCache[kind] = createWavDataUri(kind);
        }
        const audio = new Audio(state.fallbackAudioCache[kind]);
        audio.volume = kind === "spin" ? 0.44 : 0.72;
        audio.loop = loop;
        audio.play().catch(() => {});
        return () => {
          audio.pause();
          audio.currentTime = 0;
        };
      } catch (error) {
        return () => {};
      }
    }

    function createWavDataUri(kind) {
      const sampleRate = 22050;
      const duration = kind === "spin" ? 1.2 : 1.25;
      const total = Math.floor(sampleRate * duration);
      const events = kind === "spin"
        ? [
            [523.25, 0, 0.16, 0.5], [659.25, 0.18, 0.16, 0.46],
            [783.99, 0.36, 0.16, 0.48], [659.25, 0.54, 0.16, 0.42],
            [880, 0.72, 0.16, 0.45], [1046.5, 0.94, 0.18, 0.34]
          ]
        : [
            [523.25, 0, 0.18, 0.55], [659.25, 0.09, 0.2, 0.5],
            [783.99, 0.18, 0.22, 0.52], [1046.5, 0.3, 0.26, 0.55],
            [1318.51, 0.44, 0.28, 0.46], [1567.98, 0.58, 0.34, 0.42],
            [783.99, 0.7, 0.46, 0.22], [987.77, 0.7, 0.46, 0.18],
            [1174.66, 0.7, 0.46, 0.16]
          ];
      const pcm = new Int16Array(total);
      events.forEach(([freq, start, length, gain]) => {
        const startIndex = Math.floor(start * sampleRate);
        const endIndex = Math.min(total, startIndex + Math.floor(length * sampleRate));
        for (let i = startIndex; i < endIndex; i += 1) {
          const t = (i - startIndex) / sampleRate;
          const p = t / length;
          const env = Math.sin(Math.PI * Math.min(1, p));
          pcm[i] += Math.max(-32767, Math.min(32767, Math.sin(Math.PI * 2 * freq * t) * env * gain * 9500));
        }
      });

      const dataSize = pcm.length * 2;
      const buffer = new ArrayBuffer(44 + dataSize);
      const view = new DataView(buffer);
      const writeString = (offset, text) => {
        for (let i = 0; i < text.length; i += 1) view.setUint8(offset + i, text.charCodeAt(i));
      };
      writeString(0, "RIFF");
      view.setUint32(4, 36 + dataSize, true);
      writeString(8, "WAVE");
      writeString(12, "fmt ");
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      writeString(36, "data");
      view.setUint32(40, dataSize, true);
      for (let i = 0; i < pcm.length; i += 1) {
        view.setInt16(44 + i * 2, Math.max(-32767, Math.min(32767, pcm[i])), true);
      }
      let binary = "";
      const bytes = new Uint8Array(buffer);
      for (let i = 0; i < bytes.length; i += 1) binary += String.fromCharCode(bytes[i]);
      return `data:audio/wav;base64,${btoa(binary)}`;
    }

    function playStartChime(ctx) {
      [659.25, 880, 1174.66].forEach((freq, index) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const start = ctx.currentTime + index * 0.045;
        osc.type = "sine";
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(0.08, start + 0.012);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.18);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(start);
        osc.stop(start + 0.22);
      });
    }

    function playSpinSound() {
      const ctx = getAudioContext();
      if (!ctx) return playFallbackAudio("spin", true);
      try {
        if (ctx.state === "suspended") ctx.resume();
        playStartChime(ctx);
        const master = ctx.createGain();
        const tickGain = ctx.createGain();
        const sparkleGain = ctx.createGain();
        const timers = [];

        master.gain.setValueAtTime(0.0001, ctx.currentTime);
        master.gain.exponentialRampToValueAtTime(0.09, ctx.currentTime + 0.08);
        master.gain.setTargetAtTime(0.07, ctx.currentTime + 0.4, 1);
        tickGain.gain.value = 1.1;
        sparkleGain.gain.value = 0.9;
        tickGain.connect(master);
        sparkleGain.connect(master);
        master.connect(ctx.destination);

        const playBlip = (freq, delay, duration, gainValue, target) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          const filter = ctx.createBiquadFilter();
          const start = ctx.currentTime + delay;
          osc.type = "triangle";
          osc.frequency.setValueAtTime(freq, start);
          osc.frequency.exponentialRampToValueAtTime(freq * 1.018, start + duration * 0.45);
          filter.type = "bandpass";
          filter.frequency.value = freq * 1.35;
          filter.Q.value = 1.1;
          gain.gain.setValueAtTime(0.0001, start);
          gain.gain.exponentialRampToValueAtTime(gainValue, start + 0.012);
          gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
          osc.connect(filter);
          filter.connect(gain);
          gain.connect(target);
          osc.start(start);
          osc.stop(start + duration + 0.03);
        };

        let step = 0;
        const pattern = [523.25, 659.25, 783.99, 659.25, 880, 783.99];
        const scheduleTick = () => {
          playBlip(pattern[step % pattern.length], 0, 0.13, 0.09, tickGain);
          if (step % 3 === 2) playBlip(1046.5 + (step % 4) * 65, 0.035, 0.11, 0.055, sparkleGain);
          step += 1;
        };
        scheduleTick();
        timers.push(window.setInterval(scheduleTick, 165));

        return () => {
          try {
            timers.forEach((timer) => clearInterval(timer));
            master.gain.cancelScheduledValues(ctx.currentTime);
            master.gain.setValueAtTime(Math.max(master.gain.value, 0.0001), ctx.currentTime);
            master.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.16);
          } catch (error) {}
        };
      } catch (error) {
        return () => {};
      }
    }

    function playWinSound() {
      const ctx = getAudioContext();
      if (!ctx) {
        playFallbackAudio("win");
        return;
      }
      try {
        if (ctx.state === "suspended") ctx.resume();
        const notes = [523.25, 659.25, 783.99, 1046.5, 1318.51, 1567.98];
        notes.forEach((freq, index) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          const filter = ctx.createBiquadFilter();
          const start = ctx.currentTime + index * 0.075;
          osc.type = index % 2 === 0 ? "triangle" : "sine";
          osc.frequency.setValueAtTime(freq, start);
          osc.frequency.exponentialRampToValueAtTime(freq * 1.018, start + 0.06);
          filter.type = "bandpass";
          filter.frequency.value = freq * 1.25;
          filter.Q.value = 0.9;
          gain.gain.setValueAtTime(0.0001, start);
          gain.gain.exponentialRampToValueAtTime(index === notes.length - 1 ? 0.14 : 0.09, start + 0.014);
          gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.34);
          osc.connect(filter);
          filter.connect(gain);
          gain.connect(ctx.destination);
          osc.start(start);
          osc.stop(start + 0.38);
        });

        [1567.98, 1975.53, 2349.32, 2637.02].forEach((freq, index) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          const start = ctx.currentTime + 0.48 + index * 0.04;
          osc.type = "sine";
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.0001, start);
          gain.gain.exponentialRampToValueAtTime(0.07, start + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.2);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(start);
          osc.stop(start + 0.23);
        });

        [783.99, 987.77, 1174.66].forEach((freq, index) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          const start = ctx.currentTime + 0.62;
          osc.type = "triangle";
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.0001, start);
          gain.gain.exponentialRampToValueAtTime(0.045 / (index + 1), start + 0.018);
          gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.62);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(start);
          osc.stop(start + 0.66);
        });
      } catch (error) {}
    }

    function resizeFxCanvases() {
      const ratio = window.devicePixelRatio || 1;
      [els.particleCanvas, els.celebrationCanvas].forEach((canvas) => {
        canvas.width = Math.floor(window.innerWidth * ratio);
        canvas.height = Math.floor(window.innerHeight * ratio);
        canvas.style.width = `${window.innerWidth}px`;
        canvas.style.height = `${window.innerHeight}px`;
      });
      particleCtx.setTransform(ratio, 0, 0, ratio, 0, 0);
      celebrationCtx.setTransform(ratio, 0, 0, ratio, 0, 0);
      seedBackgroundParticles();
    }

    function seedBackgroundParticles() {
      const count = Math.min(140, Math.floor((window.innerWidth * window.innerHeight) / 11500));
      state.backgroundParticles = Array.from({ length: count }, () => ({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        vx: (Math.random() - 0.5) * 0.28,
        vy: -0.18 - Math.random() * 0.42,
        size: 1 + Math.random() * 2.4,
        alpha: 0.24 + Math.random() * 0.6
      }));
    }

    function animateBackgroundParticles() {
      const ctx = particleCtx;
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      ctx.save();
      state.backgroundParticles.forEach((p, index) => {
        p.x += p.vx;
        p.y += p.vy;
        if (p.y < -10) {
          p.y = window.innerHeight + 10;
          p.x = Math.random() * window.innerWidth;
        }
        if (p.x < -10) p.x = window.innerWidth + 10;
        if (p.x > window.innerWidth + 10) p.x = -10;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        const particleColor = index % 5 === 0 ? "255, 216, 107" : index % 3 === 0 ? "234, 244, 255" : "74, 168, 255";
        ctx.fillStyle = `rgba(${particleColor}, ${p.alpha})`;
        ctx.shadowColor = index % 5 === 0 ? "rgba(255, 216, 107, 0.78)" : "rgba(74, 168, 255, 0.78)";
        ctx.shadowBlur = 10;
        ctx.fill();

        const next = state.backgroundParticles[index + 1];
        if (next) {
          const dx = p.x - next.x;
          const dy = p.y - next.y;
          const dist = Math.hypot(dx, dy);
          if (dist < 105) {
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(next.x, next.y);
            ctx.strokeStyle = `rgba(74, 168, 255, ${0.12 * (1 - dist / 105)})`;
            ctx.lineWidth = 1;
            ctx.stroke();
          }
        }
      });
      ctx.restore();
      state.particleFrame = requestAnimationFrame(animateBackgroundParticles);
    }

    function burstParticles(mode) {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const amount = mode === "spin" ? 40 : 120;
      for (let i = 0; i < amount; i += 1) {
        const angle = Math.random() * Math.PI * 2;
        const speed = mode === "spin" ? 2 + Math.random() * 4 : 4 + Math.random() * 9;
        state.bursts.push({
          x: cx,
          y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          decay: 0.012 + Math.random() * 0.018,
          size: 2 + Math.random() * 5,
          color: Math.random() > 0.45 ? "#4AA8FF" : Math.random() > 0.35 ? "#FFD86B" : "#FFFFFF"
        });
      }
    }

    function launchCelebration() {
      burstParticles("win");
      launchSideFireworks();
      const colors = ["#0A47FF", "#1F6FFF", "#4AA8FF", "#FFD86B", "#FFB800", "#FFFFFF", "#EAF4FF"];
      const amount = Math.min(260, Math.floor(window.innerWidth / 5));
      for (let i = 0; i < amount; i += 1) {
        state.confetti.push({
          x: Math.random() * window.innerWidth,
          y: -20 - Math.random() * window.innerHeight * 0.4,
          vx: (Math.random() - 0.5) * 5,
          vy: 2 + Math.random() * 5,
          rot: Math.random() * Math.PI,
          vr: (Math.random() - 0.5) * 0.24,
          w: 6 + Math.random() * 9,
          h: 9 + Math.random() * 16,
          color: colors[Math.floor(Math.random() * colors.length)],
          life: 1
        });
      }
      animateCelebration();
      setTimeout(() => playWinSound(), 420);
    }

    function launchSideFireworks() {
      const colors = [activeSkin.accent, activeSkin.neon, activeSkin.white, activeSkin.accentStrong, "#FFFFFF"];
      const origins = [
        { x: window.innerWidth * 0.14, y: window.innerHeight * 0.78, direction: 1 },
        { x: window.innerWidth * 0.86, y: window.innerHeight * 0.78, direction: -1 }
      ];
      origins.forEach((origin, sideIndex) => {
        for (let shell = 0; shell < 5; shell += 1) {
          const burstX = origin.x + origin.direction * (50 + Math.random() * 130);
          const burstY = window.innerHeight * (0.22 + Math.random() * 0.32);
          const delay = shell * 8 + sideIndex * 4;
          state.fireworks.push({
            type: "shell",
            x: origin.x,
            y: origin.y,
            vx: (burstX - origin.x) / (34 + delay * 0.2),
            vy: (burstY - origin.y) / (34 + delay * 0.2),
            targetY: burstY,
            delay,
            life: 1,
            color: colors[(shell + sideIndex) % colors.length],
            exploded: false
          });
        }
      });
    }

    function explodeFirework(x, y, color) {
      const amount = 34 + Math.floor(Math.random() * 20);
      for (let i = 0; i < amount; i += 1) {
        const angle = (Math.PI * 2 * i) / amount + Math.random() * 0.16;
        const speed = 1.7 + Math.random() * 4.2;
        state.fireworks.push({
          type: "spark",
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          decay: 0.018 + Math.random() * 0.018,
          size: 1.4 + Math.random() * 2.8,
          color: Math.random() > 0.35 ? color : activeSkin.white
        });
      }
    }

    function animateCelebration() {
      const ctx = celebrationCtx;
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      state.bursts = state.bursts.filter((p) => p.life > 0);
      state.bursts.forEach((p) => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.04;
        p.life -= p.decay;
        const alpha = Math.max(0, p.life);
        const radius = Math.max(0.1, p.size * alpha);
        ctx.beginPath();
        ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
        ctx.fillStyle = hexToRgba(p.color, alpha);
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 18;
        ctx.fill();
      });
      ctx.shadowBlur = 0;

      state.confetti = state.confetti.filter((c) => c.y < window.innerHeight + 40 && c.life > 0);
      state.confetti.forEach((c) => {
        c.x += c.vx;
        c.y += c.vy;
        c.vy += 0.035;
        c.rot += c.vr;
        c.life -= 0.0025;
        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.rotate(c.rot);
        ctx.fillStyle = hexToRgba(c.color, Math.max(0, c.life));
        ctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
        ctx.restore();
      });

      state.fireworks = state.fireworks.filter((f) => f.life > 0);
      state.fireworks.forEach((f) => {
        if (f.delay > 0) {
          f.delay -= 1;
          return;
        }

        if (f.type === "shell") {
          const prevX = f.x;
          const prevY = f.y;
          f.x += f.vx;
          f.y += f.vy;
          f.vy += 0.035;
          f.life -= 0.012;
          ctx.beginPath();
          ctx.moveTo(prevX, prevY);
          ctx.lineTo(f.x, f.y);
          ctx.strokeStyle = hexToRgba(f.color, 0.88);
          ctx.lineWidth = 2.4;
          ctx.shadowColor = f.color;
          ctx.shadowBlur = 18;
          ctx.stroke();
          if (!f.exploded && (f.y <= f.targetY || f.life < 0.58)) {
            f.exploded = true;
            f.life = 0;
            explodeFirework(f.x, f.y, f.color);
          }
          return;
        }

        f.x += f.vx;
        f.y += f.vy;
        f.vx *= 0.985;
        f.vy = f.vy * 0.985 + 0.045;
        f.life -= f.decay;
        const alpha = Math.max(0, f.life);
        ctx.beginPath();
        ctx.arc(f.x, f.y, Math.max(0.1, f.size * alpha), 0, Math.PI * 2);
        ctx.fillStyle = hexToRgba(f.color, alpha);
        ctx.shadowColor = f.color;
        ctx.shadowBlur = 20;
        ctx.fill();
      });
      ctx.shadowBlur = 0;

      if (state.bursts.length || state.confetti.length || state.fireworks.length) {
        requestAnimationFrame(animateCelebration);
      } else {
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      }
    }

    function hexToRgba(hex, alpha) {
      const raw = hex.replace("#", "");
      const num = parseInt(raw, 16);
      const r = (num >> 16) & 255;
      const g = (num >> 8) & 255;
      const b = num & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function bindEvents() {
      els.configToggleBtn.addEventListener("click", () => toggleConfigPanel());
      document.querySelectorAll(".config-section").forEach((section) => {
        const toggle = section.querySelector(".section-toggle");
        if (toggle) toggle.addEventListener("click", () => toggleConfigSection(section));
      });
      els.activityTitleInput.addEventListener("input", () => applyActivityTitle(els.activityTitleInput.value));
      els.themeClearBtn.addEventListener("click", () => applyTheme(defaultConfig.defaultTheme || "default", { persist: true }));
      els.generateBtn.addEventListener("click", generateWheel);
      els.startBtn.addEventListener("click", startDraw);
      els.hubButton.addEventListener("click", startDraw);
      els.resetBtn.addEventListener("click", resetAll);
      els.fullscreenBtn.addEventListener("click", toggleFullscreen);
      els.exportBtn.addEventListener("click", exportCsv);
      els.shuffleBtn.addEventListener("click", shuffleNames);
      els.clearBtn.addEventListener("click", clearNames);
      els.fileInput.addEventListener("change", (event) => importNamesFromFile(event.target.files[0]));
      els.closeWinnerBtn.addEventListener("click", () => els.winnerModal.classList.remove("show"));
      els.winnerModal.addEventListener("click", (event) => {
        if (event.target === els.winnerModal) els.winnerModal.classList.remove("show");
      });
      document.addEventListener("fullscreenchange", () => {
        setButtonContent(els.fullscreenBtn, "fullscreen", document.fullscreenElement ? uiText.exitFullscreenButton : uiText.fullscreenButton);
      });
      document.addEventListener("keydown", (event) => {
        const tag = document.activeElement ? document.activeElement.tagName.toLowerCase() : "";
        const isTyping = tag === "textarea" || tag === "input";
        if (event.code === "Space" && !isTyping) {
          event.preventDefault();
          startDraw();
        }
        if ((event.key === "r" || event.key === "R") && !isTyping) {
          event.preventDefault();
          resetAll();
        }
        if (event.key === "Escape") {
          els.winnerModal.classList.remove("show");
        }
      });
      window.addEventListener("resize", () => {
        resizeFxCanvases();
        drawWheel();
      });
    }

    function init() {
      renderThemeCards();
      applyUIText();
      loadDefaultConfig();
      bindEvents();
      resizeFxCanvases();
      animateBackgroundParticles();
      generateWheel();
      restoreSavedTheme();
    }

    init();
  </script>
</body>
</html>
