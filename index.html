<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lucky Draw</title>
  <meta name="description" content="Single-file HTML lucky-draw wheel for live presentations: dual-ring spinning, theme switching, voice announcement, confetti and side fireworks." />
  <style>
    :root {
      --bg-deep: #061b4d;
      --bg-mid: #081f57;
      --tech-blue: #1f6fff;
      --neon-blue: #4aa8ff;
      --white-glow: #eaf4ff;
      --gold: #ffd86b;
      --gold-strong: #ffb800;
      --danger: #ff477e;
      --muted: rgba(234, 244, 255, 0.7);
      --panel: rgba(6, 27, 77, 0.22);
      --panel-border: rgba(74, 168, 255, 0.34);
      --shadow-blue: 0 0 34px rgba(31, 111, 255, 0.42);
      --shadow-gold: 0 0 34px rgba(255, 216, 107, 0.4);
      --primary-rgb: 31, 111, 255;
      --neon-rgb: 74, 168, 255;
      --accent-rgb: 255, 216, 107;
      --panel-rgb: 6, 27, 77;
      --active-theme-image: none;
      font-family: "HarmonyOS Sans SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei UI", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      color: #fff;
      background: #061b4d;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      position: relative;
      background:
        radial-gradient(circle at 18% 14%, rgba(74, 168, 255, 0.34), transparent 28%),
        radial-gradient(circle at 88% 78%, rgba(255, 216, 107, 0.18), transparent 28%),
        linear-gradient(135deg, var(--bg-deep) 0%, var(--bg-mid) 48%, #0d2b75 100%);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -30%;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background:
        linear-gradient(112deg, transparent 0 42%, rgba(74, 168, 255, 0.2) 48%, transparent 54%),
        linear-gradient(72deg, transparent 0 36%, rgba(255, 216, 107, 0.1) 42%, transparent 48%);
      animation: lightSweep 8s linear infinite;
      transform: translateX(-36%);
    }

    body::after {
      background-image:
        linear-gradient(rgba(74, 168, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74, 168, 255, 0.08) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: radial-gradient(circle at center, #000 0 50%, transparent 75%);
      opacity: 0.7;
    }

    @keyframes lightSweep {
      0% { transform: translateX(-45%) rotate(0.001deg); }
      100% { transform: translateX(45%) rotate(0.001deg); }
    }

    .page {
      position: relative;
      z-index: 2;
      height: 100vh;
      height: 100dvh;
      padding: clamp(10px, 1.25vw, 22px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: clamp(8px, 1vw, 14px);
      overflow: hidden;
    }

    #themeBackground,
    #particleCanvas,
    #celebrationCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #themeBackground {
      z-index: 0;
      opacity: 0;
      background-image:
        radial-gradient(circle at 50% 44%, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.16) 78%),
        linear-gradient(90deg, rgba(var(--panel-rgb), 0.08), rgba(var(--panel-rgb), 0) 42%, rgba(var(--panel-rgb), 0.12)),
        var(--active-theme-image);
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      transition: opacity 0.35s ease;
    }

    body.theme-image-on #themeBackground {
      opacity: 0.96;
    }

    #particleCanvas {
      z-index: 1;
    }

    #celebrationCanvas {
      z-index: 8;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      padding: clamp(10px, 1vw, 16px) clamp(14px, 1.2vw, 22px);
      border: 1px solid rgba(var(--neon-rgb), 0.28);
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(var(--panel-rgb), 0.34), rgba(var(--primary-rgb), 0.1)),
        linear-gradient(180deg, rgba(234, 244, 255, 0.08), rgba(255, 248, 216, 0.02));
      box-shadow: var(--shadow-blue), inset 0 0 36px rgba(74, 168, 255, 0.09);
      backdrop-filter: blur(8px);
    }

    .title-wrap h1 {
      margin: 0;
      font-size: clamp(26px, 3vw, 48px);
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: 0;
      text-shadow:
        0 0 10px rgba(234, 244, 255, 0.68),
        0 0 30px rgba(74, 168, 255, 0.62);
    }

    .title-wrap p {
      margin: 10px 0 0;
      color: var(--gold);
      font-size: clamp(15px, 1.6vw, 23px);
      font-weight: 700;
      text-shadow: 0 0 18px rgba(247, 210, 122, 0.48);
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(92px, 1fr));
      gap: 10px;
      min-width: min(460px, 40vw);
    }

    .stat {
      padding: 12px 14px;
      border: 1px solid rgba(var(--neon-rgb), 0.28);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(234, 244, 255, 0.07), transparent),
        rgba(var(--panel-rgb), 0.22);
      text-align: center;
      box-shadow: inset 0 0 18px rgba(247, 210, 122, 0.08);
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .stat strong {
      display: block;
      margin-top: 4px;
      color: var(--white-glow);
      font-size: 28px;
      line-height: 1;
      text-shadow: 0 0 14px rgba(74, 168, 255, 0.78);
    }

    .main {
      min-height: 0;
      position: relative;
      display: grid;
      grid-template-columns: minmax(450px, 1fr) auto;
      gap: 18px;
      align-items: stretch;
    }

    .wheel-stage,
    .side-panel,
    .controls {
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: rgba(var(--panel-rgb), 0.1);
      box-shadow: var(--shadow-blue), inset 0 0 42px rgba(74, 168, 255, 0.08);
      backdrop-filter: blur(8px);
    }

    .wheel-stage {
      order: 1;
      position: relative;
      min-height: 0;
      padding: clamp(6px, 1vw, 16px);
      display: grid;
      place-items: center;
      overflow: hidden;
      background: transparent;
      border-color: transparent;
      box-shadow: none;
      backdrop-filter: none;
    }

    .wheel-stage::before {
      content: "";
      position: absolute;
      inset: 20px;
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 50%;
      pointer-events: none;
      filter: drop-shadow(0 0 18px rgba(247, 210, 122, 0.28));
      animation: haloPulse 2.5s ease-in-out infinite;
    }

    @keyframes haloPulse {
      0%, 100% { opacity: 0.46; transform: scale(0.985); }
      50% { opacity: 0.92; transform: scale(1.01); }
    }

    .wheel-wrap {
      position: relative;
      width: min(68vh, 100%, 800px);
      max-height: 100%;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
    }

    #wheelCanvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      filter:
        drop-shadow(0 0 18px rgba(var(--accent-rgb), 0.54))
        drop-shadow(0 0 46px rgba(var(--primary-rgb), 0.28));
    }

    .pointer {
      position: absolute;
      top: -8px;
      left: 50%;
      width: 56px;
      height: 86px;
      transform: translateX(-50%);
      clip-path: polygon(50% 100%, 0 0, 100% 0);
      background:
        linear-gradient(90deg, rgba(var(--neon-rgb), 0.95), rgba(255, 255, 255, 0.96) 28%, var(--gold) 50%, rgba(255, 255, 255, 0.92) 72%, rgba(var(--neon-rgb), 0.95)),
        var(--gold);
      filter: drop-shadow(0 0 14px rgba(var(--neon-rgb), 0.95)) drop-shadow(0 0 18px rgba(var(--accent-rgb), 0.65));
      z-index: 4;
    }

    .pointer::after {
      content: "";
      position: absolute;
      inset: 8px 21px 34px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 0 18px rgba(255, 255, 255, 0.9);
    }

    .hub {
      position: absolute;
      width: 24%;
      aspect-ratio: 1;
      border: 2px solid rgba(255, 255, 255, 0.82);
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 35%, rgba(255, 255, 255, 0.96) 0 8%, var(--neon-blue) 9% 32%, var(--tech-blue) 33% 58%, rgba(3, 10, 35, 0.96) 59% 100%);
      display: grid;
      place-items: center;
      text-align: center;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 12px rgba(0, 0, 0, 0.7);
      box-shadow:
        0 0 18px rgba(255, 255, 255, 0.6),
        0 0 36px rgba(var(--neon-rgb), 0.78),
        0 0 24px rgba(var(--accent-rgb), 0.42),
        inset 0 0 24px rgba(255, 255, 255, 0.22);
      z-index: 3;
      user-select: none;
    }

    .hub span {
      width: 72%;
      display: block;
      font-size: clamp(13px, 1.8vw, 24px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .side-panel {
      order: 2;
      width: min(420px, 34vw);
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 10px;
      padding: 16px;
      overflow: hidden;
      transition: width 0.22s ease, padding 0.22s ease, background 0.22s ease, border-color 0.22s ease;
    }

    .side-panel.collapsed {
      width: 62px;
      padding: 10px;
      align-self: start;
    }

    .config-toggle {
      width: 44px;
      height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      letter-spacing: 0;
    }

    .side-panel.collapsed .config-toggle {
      width: 100%;
    }

    .config-toggle svg,
    .section-arrow svg {
      display: block;
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .config-toggle-icon {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(var(--accent-rgb), 0.38);
      border-radius: 50%;
      color: var(--gold);
      background: rgba(var(--accent-rgb), 0.08);
      box-shadow: inset 0 0 10px rgba(var(--accent-rgb), 0.12);
    }

    .config-toggle .icon-close {
      display: none;
    }

    .side-panel:not(.collapsed) .config-toggle .icon-gear {
      display: none;
    }

    .side-panel:not(.collapsed) .config-toggle .icon-close {
      display: block;
    }

    .config-body {
      min-height: 0;
      display: block;
      overflow: auto;
      padding-right: 2px;
    }

    .side-panel.collapsed .config-body {
      display: none;
    }

    .config-section {
      border: 1px solid rgba(var(--accent-rgb), 0.22);
      border-radius: 8px;
      background: rgba(var(--panel-rgb), 0.24);
      overflow: hidden;
    }

    .config-section + .config-section {
      margin-top: 10px;
    }

    .section-toggle {
      width: 100%;
      min-height: 48px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      border: 0;
      border-radius: 0;
      text-align: left;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(var(--primary-rgb), 0.1)),
        rgba(var(--panel-rgb), 0.62);
      box-shadow: none;
    }

    .section-toggle:hover {
      transform: none;
    }

    .section-title {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .section-title strong {
      font-size: 16px;
      color: #fff;
      text-shadow: 0 0 12px rgba(247, 210, 122, 0.48);
    }

    .section-title span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }

    .section-arrow {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border: 1px solid rgba(var(--accent-rgb), 0.28);
      border-radius: 50%;
      color: var(--gold);
      background: rgba(var(--accent-rgb), 0.06);
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .config-section.open > .section-toggle .section-arrow {
      transform: rotate(90deg);
      border-color: rgba(var(--accent-rgb), 0.66);
      background: rgba(var(--accent-rgb), 0.12);
    }

    .section-content {
      display: none;
      padding: 10px;
      border-top: 1px solid rgba(var(--accent-rgb), 0.16);
      background: rgba(0, 0, 0, 0.14);
    }

    .config-section.open .section-content {
      display: block;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: #fff;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 20px;
      text-shadow: 0 0 12px rgba(247, 210, 122, 0.62);
    }

    .mini-note {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    input[type="text"],
    textarea {
      width: 100%;
      border: 1px solid rgba(247, 210, 122, 0.32);
      border-radius: 8px;
      padding: 12px;
      color: #fff8df;
      background: rgba(6, 5, 4, 0.78);
      outline: none;
      line-height: 1.55;
      font-size: 15px;
      box-shadow: inset 0 0 18px rgba(247, 210, 122, 0.08);
    }

    input[type="text"] {
      min-height: 44px;
    }

    textarea {
      min-height: 170px;
      resize: vertical;
    }

    input[type="text"]:focus,
    textarea:focus {
      border-color: var(--neon-blue);
      box-shadow: 0 0 0 2px rgba(247, 210, 122, 0.18), inset 0 0 18px rgba(247, 210, 122, 0.12);
    }

    .theme-controls {
      display: grid;
      gap: 8px;
    }

    .theme-grid {
      max-height: 270px;
      overflow: auto;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding-right: 2px;
    }

    .theme-card {
      min-height: 104px;
      padding: 0;
      overflow: hidden;
      display: grid;
      grid-template-rows: 76px auto;
      border: 1px solid rgba(247, 210, 122, 0.28);
      background: rgba(6, 5, 4, 0.72);
      white-space: normal;
      text-align: left;
    }

    .theme-card.active {
      border-color: rgba(255, 248, 216, 0.9);
      box-shadow: 0 0 22px rgba(247, 210, 122, 0.46), inset 0 0 14px rgba(255, 248, 216, 0.14);
    }

    .theme-thumb {
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 50% 40%, rgba(247, 210, 122, 0.28), transparent 45%),
        linear-gradient(135deg, #050403, #31200d);
      background-position: center;
      background-size: cover;
    }

    .theme-name {
      display: block;
      padding: 8px;
      color: #fff8df;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.25;
    }

    .theme-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .theme-actions button {
      min-height: 38px;
      padding: 8px 10px;
      font-size: 13px;
    }

    .theme-file {
      display: none;
    }

    .list-box {
      min-height: 0;
      overflow: auto;
      border: 1px solid rgba(247, 210, 122, 0.22);
      border-radius: 8px;
      background: rgba(6, 5, 4, 0.58);
      padding: 10px 12px;
    }

    .drawn-list,
    .history-list {
      margin: 0;
      padding-left: 24px;
      color: #fff8df;
      line-height: 1.7;
      font-size: 14px;
    }

    .empty {
      color: var(--muted);
      font-size: 14px;
      padding: 8px 2px;
    }

    .file-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      align-items: center;
    }

    .file-row input[type="file"] {
      color: var(--muted);
      font-size: 13px;
      max-width: 100%;
    }

    .message {
      min-height: 18px;
      color: var(--gold);
      font-size: 13px;
      line-height: 1.4;
    }

    .controls {
      padding: clamp(8px, 0.8vw, 12px);
      display: grid;
      grid-template-columns: repeat(7, minmax(110px, 1fr));
      gap: 8px;
      align-items: center;
    }

    button,
    .file-label {
      min-height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      color: #fff;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.14), rgba(var(--primary-rgb), 0.22)),
        rgba(var(--panel-rgb), 0.5);
      font-size: 15px;
      font-weight: 800;
      white-space: nowrap;
      text-align: center;
      box-shadow: 0 0 16px rgba(var(--accent-rgb), 0.16), inset 0 0 14px rgba(255, 255, 255, 0.08);
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease, border-color 0.15s ease;
    }

    button:hover,
    .file-label:hover {
      transform: translateY(-1px);
      border-color: rgba(var(--accent-rgb), 0.78);
      box-shadow: 0 0 24px rgba(var(--accent-rgb), 0.36), inset 0 0 14px rgba(255, 255, 255, 0.1);
    }

    button:active,
    .file-label:active {
      transform: translateY(1px) scale(0.99);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.46;
      transform: none;
    }

    .controls button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .btn-icon {
      width: 17px;
      height: 17px;
      flex: 0 0 auto;
      color: currentColor;
      filter: drop-shadow(0 0 8px rgba(var(--accent-rgb), 0.35));
    }

    .btn-icon svg {
      display: block;
      width: 100%;
      height: 100%;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .btn-label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    button.hub {
      min-height: 0;
      padding: 0;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.82);
      background:
        radial-gradient(circle at 50% 35%, rgba(255, 255, 255, 0.96) 0 8%, #4aa8ff 9% 32%, #0a47ff 33% 58%, rgba(3, 10, 35, 0.96) 59% 100%);
      box-shadow:
        0 0 18px rgba(255, 255, 255, 0.6),
        0 0 36px rgba(74, 168, 255, 0.78),
        0 0 24px rgba(255, 216, 107, 0.42),
        inset 0 0 24px rgba(255, 255, 255, 0.22);
    }

    button.hub:hover {
      transform: none;
      border-color: rgba(255, 216, 107, 0.9);
      box-shadow:
        0 0 26px rgba(255, 255, 255, 0.7),
        0 0 52px rgba(74, 168, 255, 0.86),
        0 0 34px rgba(255, 216, 107, 0.54),
        inset 0 0 28px rgba(255, 255, 255, 0.24);
    }

    button.hub:disabled {
      opacity: 1;
      cursor: not-allowed;
    }

    .primary {
      background:
        linear-gradient(180deg, rgba(255, 250, 224, 0.98), rgba(247, 210, 122, 0.95) 42%, rgba(159, 99, 21, 0.95)),
        var(--gold);
      color: #160f06;
      border-color: rgba(255, 248, 206, 0.7);
      box-shadow: var(--shadow-gold), inset 0 0 14px rgba(255, 255, 255, 0.34);
    }

    .danger {
      background:
        linear-gradient(180deg, rgba(139, 52, 36, 0.88), rgba(80, 18, 18, 0.86)),
        rgba(48, 9, 9, 0.86);
    }

    .ghost {
      background:
        linear-gradient(180deg, rgba(255, 248, 216, 0.08), rgba(120, 80, 22, 0.12)),
        rgba(8, 7, 5, 0.46);
    }

    .winner-modal {
      position: fixed;
      inset: 0;
      z-index: 9;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.54);
      backdrop-filter: blur(6px);
    }

    .winner-modal.show {
      display: grid;
    }

    .winner-card {
      position: relative;
      width: min(760px, 92vw);
      padding: clamp(30px, 4vw, 54px) clamp(24px, 4vw, 52px);
      border: 1px solid rgba(var(--accent-rgb), 0.7);
      border-radius: 8px;
      text-align: center;
      background:
        linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.18), transparent) top / 100% 1px no-repeat,
        radial-gradient(circle at 50% 0%, rgba(var(--accent-rgb), 0.26), transparent 40%),
        radial-gradient(circle at 50% 100%, rgba(var(--neon-rgb), 0.22), transparent 48%),
        linear-gradient(135deg, rgba(var(--panel-rgb), 0.94), rgba(2, 8, 28, 0.98));
      box-shadow:
        0 0 42px rgba(var(--accent-rgb), 0.5),
        0 0 78px rgba(var(--primary-rgb), 0.34),
        inset 0 0 36px rgba(255, 255, 255, 0.08);
      animation: winnerPop 0.7s cubic-bezier(0.2, 1.2, 0.22, 1) both;
      overflow: hidden;
    }

    .winner-card::before,
    .winner-card::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: min(560px, 72%);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(var(--accent-rgb), 0.72), rgba(255, 255, 255, 0.84), rgba(var(--accent-rgb), 0.72), transparent);
      pointer-events: none;
    }

    .winner-card::before {
      top: 18px;
    }

    .winner-card::after {
      bottom: 18px;
    }

    @keyframes winnerPop {

      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .winner-kicker {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 30px;
      padding: 5px 18px;
      border: 1px solid rgba(var(--accent-rgb), 0.42);
      border-radius: 999px;
      color: var(--white-glow);
      background: rgba(var(--primary-rgb), 0.18);
      font-size: clamp(13px, 1.4vw, 16px);
      font-weight: 900;
      letter-spacing: 0;
      box-shadow: inset 0 0 16px rgba(255, 255, 255, 0.08), 0 0 20px rgba(var(--accent-rgb), 0.2);
    }

    .winner-medal {
      width: clamp(76px, 8vw, 108px);
      height: clamp(76px, 8vw, 108px);
      margin: clamp(18px, 2.2vw, 28px) auto 12px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(var(--accent-rgb), 0.78);
      border-radius: 50%;
      color: #181004;
      font-size: clamp(36px, 5vw, 58px);
      background:
        radial-gradient(circle at 38% 30%, rgba(255, 255, 255, 0.96), transparent 18%),
        radial-gradient(circle, var(--gold), var(--gold-strong) 64%, rgba(var(--panel-rgb), 0.9) 66%);
      box-shadow:
        0 0 30px rgba(var(--accent-rgb), 0.58),
        0 0 52px rgba(var(--neon-rgb), 0.28),
        inset 0 0 18px rgba(255, 255, 255, 0.36);
      animation: medalGlow 1.3s ease-in-out infinite alternate;
    }

    @keyframes medalGlow {
      from { transform: translateY(0) scale(1); filter: brightness(1); }
      to { transform: translateY(-4px) scale(1.035); filter: brightness(1.12); }
    }

    .winner-card h2 {
      margin: 10px 0 12px;
      color: #fff;
      font-size: clamp(30px, 4.2vw, 54px);
      line-height: 1.08;
      font-weight: 900;
      text-shadow: 0 0 22px rgba(255, 255, 255, 0.74), 0 0 34px rgba(var(--neon-rgb), 0.4);
    }

    .winner-name {
      margin: 10px 0;
      color: var(--gold);
      font-size: clamp(56px, 8.6vw, 112px);
      font-weight: 900;
      line-height: 1.02;
      word-break: break-word;
      text-shadow: 0 0 28px rgba(var(--accent-rgb), 0.84), 0 0 52px rgba(var(--accent-rgb), 0.28);
    }

    .winner-scheme {
      width: fit-content;
      max-width: 100%;
      margin: 16px auto 0;
      padding: 9px 18px;
      border: 1px solid rgba(var(--neon-rgb), 0.34);
      border-radius: 999px;
      color: var(--white-glow);
      background: rgba(var(--primary-rgb), 0.16);
      font-size: clamp(16px, 2.1vw, 24px);
      font-weight: 900;
      line-height: 1.25;
      text-shadow: 0 0 16px rgba(var(--neon-rgb), 0.52);
      word-break: break-word;
    }

    .winner-card p {
      margin: 16px 0 0;
      color: rgba(255, 255, 255, 0.9);
      font-size: clamp(18px, 2.2vw, 28px);
      font-weight: 800;
    }

    .winner-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .spark {
      animation: spark 0.7s ease-in-out infinite alternate;
    }

    @keyframes spark {
      from { filter: brightness(1); }
      to { filter: brightness(1.35) drop-shadow(0 0 16px rgba(247, 210, 122, 0.8)); }
    }

    .screen-reader {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    @media (max-width: 1180px) {
      .topbar {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .status-grid {
        min-width: 0;
        width: 100%;
      }

      .main {
        grid-template-columns: 1fr;
      }

      .side-panel {
        width: min(420px, 100%);
      }

      .controls {
        grid-template-columns: repeat(4, minmax(92px, 1fr));
      }
    }

    @media (max-width: 1400px) {
      .side-panel:not(.collapsed) {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: 420px;
        max-width: calc(100vw - 24px);
        min-width: 420px;
        max-height: 100%;
        z-index: 6;
      }
    }

    @media (max-width: 720px) {
      .page {
        padding: 8px;
        gap: 7px;
      }

      .topbar {
        padding: 9px 10px;
      }

      .title-wrap h1 {
        font-size: clamp(20px, 6vw, 30px);
      }

      .title-wrap p {
        margin-top: 4px;
        font-size: clamp(13px, 4vw, 18px);
      }

      .status-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
      }

      .stat {
        padding: 6px 4px;
      }

      .stat span {
        font-size: 11px;
      }

      .stat strong {
        font-size: 21px;
      }

      .controls {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
      }

      .main {
        gap: 6px;
      }

      .wheel-stage {
        min-height: 0;
        padding: 2px;
      }

      .wheel-wrap {
        width: min(88vw, 46vh, 520px);
      }

      .pointer {
        width: 42px;
        height: 64px;
        top: -4px;
      }

      .pointer::after {
        inset: 7px 16px 26px;
      }

      button,
      .file-label {
        min-height: 34px;
        padding: 7px 6px;
        font-size: 12px;
      }

      .side-panel.collapsed {
        width: 54px;
        padding: 7px;
        position: absolute;
        right: 2px;
        bottom: 2px;
        z-index: 5;
      }

      .side-panel:not(.collapsed) {
        width: calc(100vw - 16px);
        max-width: calc(100vw - 16px);
        min-width: 0;
      }

      .side-panel.collapsed .config-toggle {
        width: 40px;
        height: 40px;
      }
    }
